<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compfu AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --bg-main: #212121;
      --bg-sidebar: #171717;
      --text-main: #ececf1;
      --text-muted: #9b9b9b;
      --accent: #10a37f;
      --accent-hover: #1aa784;
      --border-color: #383838;
      --chat-user-bg: #2f2f2f;
      --input-bg: #2f2f2f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: var(--bg-main);
      color: var(--text-main);
      overflow: hidden;
    }

    /* Sidebar Styles */
    #sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .btn {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn:hover {
      background: #202123;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      text-align: center;
      justify-content: center;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    /* Main Chat Area */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-header {
      padding: 16px;
      font-weight: 500;
      border-bottom: 1px solid var(--border-color);
      display: none;
      /* Mobile only usually, but here for structure */
    }

    #chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #565869;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #717282;
    }

    /* Messages */
    .message-row {
      padding: 24px;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .message-content {
      max-width: 768px;
      width: 100%;
      display: flex;
      gap: 16px;
      line-height: 1.6;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      flex-shrink: 0;
    }

    .avatar-user {
      background: #5436DA;
    }

    .avatar-bot {
      background: var(--accent);
    }

    .message-text {
      flex: 1;
      white-space: pre-wrap;
    }

    /* Input Area */
    .input-section {
      padding: 24px;
      background: linear-gradient(180deg, rgba(33, 33, 33, 0) 0%, var(--bg-main) 50%);
      display: flex;
      justify-content: center;
      width: 100%;
    }

    #inputArea {
      max-width: 768px;
      width: 100%;
      background: var(--input-bg);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border-color);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 16px;
      outline: none;
      resize: none;
      max-height: 200px;
      height: 24px;
      line-height: 24px;
    }

    #input::placeholder {
      color: var(--text-muted);
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: #40414f;
      color: var(--text-main);
    }

    .icon-btn.send-active {
      background: var(--accent);
      color: white;
    }

    /* Google Auth Container Override */
    #g_id_onload_container {
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #202123;
      border-radius: 8px;
    }

    .user-profile img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .user-profile span {
      flex: 1;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-main);
      font-size: 14px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .history-item:hover {
      background: #202123;
    }

    .history-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .history-item-actions {
      display: none;
      gap: 2px;
      flex-shrink: 0;
    }

    .history-item:hover .history-item-actions {
      display: flex;
    }

    .history-action-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .history-action-btn:hover {
      background: #383838;
      color: var(--text-main);
    }

    .history-action-btn.pinned {
      color: #f0a500;
    }
  </style>
</head>

<body>

  <aside id="sidebar">
    <div class="sidebar-top">
      <button class="btn" onclick="newChat()">
        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
          stroke-linejoin="round" height="16" width="16" xmlns="http://www.w3.org/2000/svg">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New Chat
      </button>
    </div>

    <div id="chatHistory" class="chat-history"></div>

    <div class="sidebar-bottom">
      <div id="authButtons">
        <button class="btn btn-primary" onclick="register()">Register</button>
        <button class="btn btn-primary" onclick="login()">Login</button>

        <div id="g_id_onload_container">
          <div id="g_id_onload"
            data-client_id="108777954880-41bb7v9p6oc59ank05649elu0hn3f58t.apps.googleusercontent.com"
            data-callback="handleGoogle"></div>
          <div class="g_id_signin"></div>
        </div>
      </div>
      <div id="userProfileContainer" style="display: none;">
      </div>
    </div>
  </aside>

  <main>
    <div id="chatbox">
      <!-- Default state message or empty -->
    </div>

    <div class="input-section" style="flex-direction: column; align-items: center;">
      <div id="inputArea">
        <button class="icon-btn" onclick="startVoice()" title="Voice Input">
          <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="20" width="20"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
        <input id="input" placeholder="Message Compfu AI..." oninput="checkInput()">
        <button id="sendBtn" class="icon-btn" onclick="send()" title="Send Message">
          <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="20" width="20"
            xmlns="http://www.w3.org/2000/svg">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <script>
    let token = "", chats = [], currentChatId = null;
    const inputElement = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const chatbox = document.getElementById('chatbox');

    // UI Logic
    function checkInput() {
      if (inputElement.value.trim().length > 0) {
        sendBtn.classList.add('send-active');
      } else {
        sendBtn.classList.remove('send-active');
      }
    }

    inputElement.addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        if (inputElement.value.trim()) send();
      }
    });

    // Chat Logic
    function addMessage(text, type) {
      const row = document.createElement("div");
      row.className = "message-row " + type;
      if (type === 'bot') row.style.backgroundColor = 'transparent';

      const content = document.createElement("div");
      content.className = "message-content";

      const avatar = document.createElement("div");
      avatar.className = "avatar " + (type === 'user' ? 'avatar-user' : 'avatar-bot');
      avatar.innerText = type === 'user' ? 'U' : 'AI';

      const msgText = document.createElement("div");
      msgText.className = "message-text";

      // Render markdown images/videos inline
      if (text.match(/!\[.*?\]\(.*?\)/)) {
        msgText.innerHTML = text.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;margin-top:8px;"/>');
      } else if (text.includes('<video')) {
        msgText.innerHTML = text;
      } else {
        msgText.innerText = text;
      }

      content.appendChild(avatar);
      content.appendChild(msgText);
      row.appendChild(content);
      chatbox.appendChild(row);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    // 🎤 SPEECH TO TEXT
    function startVoice() {
      const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      rec.start();
      rec.onresult = e => {
        inputElement.value = e.results[0][0].transcript;
        checkInput();
      }
    }

    // 🔊 TEXT TO SPEECH
    function speak(text) {
      const speech = new SpeechSynthesisUtterance(text);
      speechSynthesis.speak(speech);
    }

    // ─── SEND ──────────────────────────────────────────────────────────────────
    async function send() {
      const msg = inputElement.value.trim();
      if (!msg) return;

      addMessage(msg, "user");
      inputElement.value = "";

      const payload = { message: msg, chatId: currentChatId };
      checkInput();

      try {
        const res = await axios.post("/chat", payload,
          { headers: { Authorization: token } }
        );
        addMessage(res.data.reply, "bot");
        speak(res.data.reply);
        loadChats();
      } catch (error) {
        console.error("Server error:", error);
        if (error.response && error.response.status === 401) {
          addMessage("You are not logged in. Please click Login or Register on the sidebar first to start chatting.", "bot");
        } else {
          addMessage("I am currently offline or disconnected. Please try again later.", "bot");
        }
      }
    }

    // ─── NEW CHAT ──────────────────────────────────────────────────────────────
    async function newChat() {
      if (!token) {
        chatbox.innerHTML = '';
        addMessage("Please log in to start a chat.", "bot");
        return;
      }
      try {
        const res = await axios.post("/new-chat", {}, {
          headers: { Authorization: token }
        });
        currentChatId = res.data.id;
        chatbox.innerHTML = '';
        loadChats();
      } catch (e) {
        console.error("Error creating new chat", e);
      }
    }

    // ─── AUTH ──────────────────────────────────────────────────────────────────
    async function register() {
      const u = prompt("Enter a new Username:");
      if (!u) return;
      const p = prompt("Enter a Password:");
      if (!p) return;
      try {
        await axios.post("/register", { username: u, password: p });
        alert("Registration successful! You can now Login.");
      } catch (e) {
        alert("Error registering.");
      }
    }

    async function login() {
      const u = prompt("Enter your Username:");
      if (!u) return;
      const p = prompt("Enter your Password:");
      if (!p) return;
      try {
        const res = await axios.post("/login", { username: u, password: p });
        if (res.data.token) {
          token = res.data.token;
          showProfile(res.data.name, res.data.picture);
          alert("Logged in successfully! You can now send messages.");
        } else {
          alert(res.data.msg || "Invalid credentials");
        }
      } catch (e) {
        alert("Error logging in.");
      }
    }

    async function handleGoogle(r) {
      try {
        const data = JSON.parse(atob(r.credential.split('.')[1]));
        const res = await axios.post("/google-login", {
          email: data.email, name: data.name, picture: data.picture
        });
        token = res.data.token;
        showProfile(res.data.name, res.data.picture);
      } catch (e) {
        console.error("Google Auth Error", e);
      }
    }

    function showProfile(name, picture) {
      document.getElementById('authButtons').style.display = 'none';
      const defaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%239b9b9b'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
      const profileDiv = document.getElementById('userProfileContainer');
      profileDiv.style.display = 'block';
      profileDiv.innerHTML = `
        <div class="user-profile">
          <img src="${picture || defaultAvatar}" alt="Profile">
          <span>${name}</span>
          <button class="icon-btn" onclick="logout()" title="Logout" style="padding: 4px;">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="18" width="18" xmlns="http://www.w3.org/2000/svg"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      `;
      loadChats();
    }

    // ─── CHAT HISTORY ──────────────────────────────────────────────────────────
    async function loadChats() {
      if (!token) return;
      try {
        const res = await axios.get("/get-chats", {
          headers: { Authorization: token }
        });
        chats = res.data.chats || [];

        if (!currentChatId && chats.length > 0) {
          currentChatId = chats[0].id;
          loadChatMessages(currentChatId);
        } else if (chats.length === 0) {
          currentChatId = null;
          chatbox.innerHTML = '';
          renderChatHistory();
        } else {
          renderChatHistory();
        }
      } catch (e) {
        console.error("Error loading chats", e);
      }
    }

    function renderChatHistory() {
      const historyDiv = document.getElementById('chatHistory');
      historyDiv.innerHTML = '';
      chats.forEach((chat) => {
        const item = document.createElement('div');
        item.className = 'history-item' + (chat.id === currentChatId ? ' active' : '');
        item.style.background = chat.id === currentChatId ? '#2a2b32' : '';

        // Title
        const titleSpan = document.createElement('span');
        titleSpan.className = 'history-item-title';
        titleSpan.innerText = chat.title || 'New Chat';
        titleSpan.onclick = () => loadChatMessages(chat.id);
        item.appendChild(titleSpan);

        // Action buttons
        const actions = document.createElement('div');
        actions.className = 'history-item-actions';

        // Pin button
        const pinBtn = document.createElement('button');
        pinBtn.className = 'history-action-btn' + (chat.isPinned ? ' pinned' : '');
        pinBtn.title = chat.isPinned ? 'Unpin chat' : 'Pin chat';
        pinBtn.innerHTML = `<svg stroke="currentColor" fill="${chat.isPinned ? 'currentColor' : 'none'}" stroke-width="2" viewBox="0 0 24 24" height="14" width="14" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L8 6H4l4 4-2 8 6-4 6 4-2-8 4-4h-4z"/></svg>`;
        pinBtn.onclick = (e) => { e.stopPropagation(); togglePin(chat.id); };
        actions.appendChild(pinBtn);

        // Delete button
        const delBtn = document.createElement('button');
        delBtn.className = 'history-action-btn';
        delBtn.title = 'Delete chat';
        delBtn.innerHTML = `<svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="14" width="14" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>`;
        delBtn.style.color = '#ff6b6b';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(chat.id); };
        actions.appendChild(delBtn);

        item.appendChild(actions);
        historyDiv.appendChild(item);
      });
    }

    function loadChatMessages(chatId) {
      currentChatId = chatId;
      chatbox.innerHTML = '';
      const chat = chats.find(c => c.id === chatId);
      if (chat && chat.messages) {
        chat.messages.forEach(m => addMessage(m.content, m.role === 'user' ? 'user' : 'bot'));
      }
      // Re-render to update active highlight
      renderChatHistory();
    }

    async function togglePin(chatId) {
      try {
        await axios.post(`/pin-chat/${chatId}`, {}, {
          headers: { Authorization: token }
        });
        loadChats();
      } catch (e) {
        console.error('Pin error:', e);
      }
    }

    async function deleteChat(chatId) {
      if (!confirm('Delete this chat?')) return;
      try {
        await axios.delete(`/delete-chat/${chatId}`, {
          headers: { Authorization: token }
        });
        if (currentChatId === chatId) {
          currentChatId = null;
          chatbox.innerHTML = '';
        }
        loadChats();
      } catch (e) {
        console.error('Delete error:', e);
      }
    }

    function logout() {
      token = "";
      currentChatId = null;
      chats = [];
      document.getElementById('authButtons').style.display = 'block';
      document.getElementById('userProfileContainer').style.display = 'none';
      chatbox.innerHTML = '';
      document.getElementById('chatHistory').innerHTML = '';
      addMessage("You have been logged out.", "bot");
    }
  </script>

</body>

</html>
